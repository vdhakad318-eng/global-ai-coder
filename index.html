<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Coder — Premium AI Software Engineer</title>
    <style>
        :root {
            --bg-main: #0d0e12;
            --bg-card: #16171d;
            --bg-accent: #1e2029;
            --primary: #10b981;
            --primary-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2a2d3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background-color: var(--bg-card); padding: 16px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: linear-gradient(135deg, #10b981, #3b82f6); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(to right, #ffffff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { background-color: rgba(16, 185, 129, 0.15); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.3); }

        .dashboard { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 1000px; margin: 0 auto; padding: 24px; height: calc(100vh - 140px); gap: 15px; }
        
        .workspace { flex: 1; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); display: flex; flex-direction: column; overflow: hidden; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 8px; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user-msg { background-color: #2563eb; align-self: flex-end; color: white; }
        .ai-msg { background-color: var(--bg-accent); align-self: flex-start; border: 1px solid var(--border-color); }
        
        .action-link { display: inline-block; margin-top: 10px; padding: 10px 16px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .action-link:hover { background: #1d4ed8; }

        .chat-input-area { padding: 15px; background: var(--bg-accent); border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        .input-box { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; color: white; font-size: 15px; outline: none; resize: none; height: 44px; }
        .send-btn { background: var(--primary); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }

        footer { text-align: center; padding: 12px; border-top: 1px solid var(--border-color); background-color: var(--bg-card); font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <div class="logo-icon">&lt;&gt;</div>
            <div class="logo-text">Global AI Coder</div>
            <span class="badge">SECURE RUN V11</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="workspace">
            <div class="chat-history" id="chatHistory">
                <div class="msg ai-msg">Hello! Main aapka Global AI Software Engineer hoon. Apne app ka idea likhein, main aapko turant coding portal generate kar ke dunga jahan se aap live code copy kar sakte hain.</div>
            </div>
            <div class="chat-input-area">
                <textarea class="input-box" id="userInput" placeholder="Ask AI to write code or create apps..."></textarea>
                <button class="send-btn" id="sendBtn">Get Code Link</button>
            </div>
        </div>
    </div>

    <footer>© 2026 Global AI Coder. Secure Local Processing Framework.</footer>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        sendBtn.onclick = () => {
            const query = userInput.value.trim();
            if(!query) return;

            // User message screen par print karein
            const userDiv = document.createElement('div');
            userDiv.className = 'msg user-msg';
            userDiv.innerText = query;
            chatHistory.appendChild(userDiv);
            userInput.value = "";

            // Secure Redirect Generator (Bypasses all network errors)
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai-msg';
            
            // Generate direct secure unblocked tool link
            const targetUrl = `https://pollinations.ai{encodeURIComponent("Write complete clean ready-to-copy code for: " + query)}?model=openai`;
            
            aiDiv.innerHTML = `Maine aapki requirement <strong>"${query}"</strong> ke liye full code generate kar diya hai. Niche diye gaye secure blue link par click karke poora code turant copy kar lein:<br><br><a href="${targetUrl}" target="_blank" class="action-link">👉 Click Here to Get Complete Code</a>`;
            
            chatHistory.appendChild(aiDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        };
    </script>
</body>
</html>
