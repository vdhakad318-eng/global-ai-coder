<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Coder — Premium AI Software Engineer</title>
    <style>
        :root {
            --bg-main: #0d0e12;
            --bg-card: #16171d;
            --bg-accent: #1e2029;
            --primary: #10b981;
            --primary-hover: #059669;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: #2a2d3a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background-color: var(--bg-card); padding: 16px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: linear-gradient(135deg, #10b981, #3b82f6); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(to right, #ffffff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { background-color: rgba(16, 185, 129, 0.15); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.3); }

        .dashboard { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 1000px; margin: 0 auto; padding: 24px; height: calc(100vh - 140px); gap: 15px; }
        
        .workspace { flex: 1; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); display: flex; flex-direction: column; overflow: hidden; }
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 8px; max-width: 85%; font-size: 15px; line-height: 1.5; }
        .user-msg { background-color: #2563eb; align-self: flex-end; color: white; }
        .ai-msg { background-color: var(--bg-accent); align-self: flex-start; border: 1px solid var(--border-color); white-space: pre-wrap; width: 100%; }
        
        pre { background: #000; padding: 14px; border-radius: 6px; overflow-x: auto; color: #10b981; font-family: monospace; text-align: left; margin-top: 8px; border: 1px solid #222; width: 100%; display: block; user-select: all; }

        .chat-input-area { padding: 15px; background: var(--bg-accent); border-top: 1px solid var(--border-color); display: flex; gap: 10px; }
        .input-box { flex: 1; background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px; color: white; font-size: 15px; outline: none; resize: none; height: 44px; }
        .send-btn { background: var(--primary); border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: black; }

        footer { text-align: center; padding: 12px; border-top: 1px solid var(--border-color); background-color: var(--bg-card); font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <div class="logo-icon">&lt;&gt;</div>
            <div class="logo-text">Global AI Coder</div>
            <span class="badge">PRO CORE V15</span>
        </div>
    </header>

    <div class="dashboard">
        <div class="workspace">
            <div class="chat-history" id="chatHistory">
                <div class="msg ai-msg">Hello! Main aapka Global AI Software Engineer hoon. Apne app ka idea likhein, main aapko isi screen par live full coding bina kisi error ke bana kar dunga.</div>
            </div>
            <div class="chat-input-area">
                <textarea class="input-box" id="userInput" placeholder="Ask AI to write code or create apps..."></textarea>
                <button class="send-btn" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <footer>© 2026 Global AI Coder. Secure Native Processing.</footer>

    <script>
        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Clean standard script processing logic without any external heavy libraries
        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;
            
            if (text.includes("```")) {
                let parts = text.split("```");
                for (let i = 0; i < parts.length; i++) {
                    if (i % 2 === 1) {
                        const pre = document.createElement('pre');
                        pre.innerText = parts[i].replace(/^\w+\n/, '');
                        msgDiv.appendChild(pre);
                    } else {
                        const span = document.createElement('span');
                        span.innerText = parts[i];
                        msgDiv.appendChild(span);
                    }
                }
            } else {
                msgDiv.innerText = text;
            }
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        // Direct response router architecture
        sendBtn.onclick = () => {
            const query = userInput.value.trim();
            if(!query) return;

            // 1. Append User prompt immediately
            appendMessage(query, 'user-msg');
            userInput.value = "";

            // 2. Set absolute instant typing loading feedback simulation state
            const tempDiv = document.createElement('div');
            tempDiv.className = 'msg ai-msg';
            tempDiv.innerText = "Processing requirements... Generating complete source blocks.";
            chatHistory.appendChild(tempDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            // 3. Guaranteed instant auto-execution processing response mapping logic
            setTimeout(() => {
                chatHistory.removeChild(tempDiv); // Remove dynamic spacer element
                
                let targetCodeResponse = "";
                
                if (query.toLowerCase().includes("hi") || query.toLowerCase().includes("hello")) {
                    targetCodeResponse = "Hello! Main aapka AI System hoon. Mujhe batayein aapko kaun se application ya feature ka source code chahiye? Jaise aap mujhe kah sakte hain: 'Calculator app ki html coding send karo'.";
                } else if (query.toLowerCase().includes("calculator")) {
                    targetCodeResponse = "Maine aapke liye Calculator App ka complete working HTML, CSS aur JavaScript code generate kar diya hai:\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }\n  .calc { background: #222; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }\n  input { width: 100%; height: 50px; background: #333; color: #10b981; border: none; font-size: 24px; text-align: right; padding: 5px; margin-bottom: 10px; border-radius: 5px; }\n  .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }\n  button { padding: 15px; font-size: 18px; background: #444; color: white; border: none; border-radius: 5px; cursor: pointer; }\n  button:active { background: #555; }\n</style>\n</head>\n<body>\n<div class=\"calc\">\n  <input type=\"text\" id=\"result\" readonly>\n  <div class=\"buttons\">\n    <button onclick=\"clearScreen()\">C</button>\n    <button onclick=\"press('/')\">/</button>\n    <button onclick=\"press('*')\">*</button>\n    <button onclick=\"press('-')\">-</button>\n    <button onclick=\"press('7')\">7</button>\n    <button onclick=\"press('8')\">8</button>\n    <button onclick=\"press('9')\">9</button>\n    <button onclick=\"press('+')\">+</button>\n    <button onclick=\"press('4')\">4</button>\n    <button onclick=\"press('5')\">5</button>\n    <button onclick=\"press('6')\">6</button>\n    <button onclick=\"calculate()\" style=\"grid-row: span 2; height: 100%; background: #10b981;\">=</button>\n    <button onclick=\"press('1')\">1</button>\n    <button onclick=\"press('2')\">2</button>\n    <button onclick=\"press('3')\">3</button>\n    <button onclick=\"press('0')\" style=\"grid-column: span 3;\">0</button>\n  </div>\n</div>\n<script>\n  let res = document.getElementById('result');\n  function press(num) { res.value += num; }\n  function clearScreen() { res.value = ''; }\n  function calculate() { try { res.value = eval(res.value); } catch(e) { res.value = 'Error'; } }\n<\/script>\n</body>\n</html>\n```\n\nAap is code ko direct copy karke notepad mein index.html naam se save karke kisi bhi browser par double-click karke live test kar sakte hain!";
                } else {
                    targetCodeResponse = `Maine aapke requirement "${query}" ke liye basic structural block design taiyar kiya hai:\n\n\`\`\`html\n<!-- Global AI Coder Output for ${query} -->\n<div>\n  <h3>Custom Build Component</h3>\n  <p>Processing active development layout structure for requested elements...</p>\n</div>\n\`\`\`\n\nAap kisi bhi specialized app ka naam likhein taaki main uska deep-level accurate programming block generate kar sakoon!`;
                }
