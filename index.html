<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global AI Coder — Premium AI Software Engineer</title>
    <style>
        :root {
            --bg-main: #0d0e12;
            --bg-card: #16171d;
            --primary: #10b981;
            --border-color: #2a2d3a;
            --text-main: #f3f4f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Premium Header */
        header { background-color: var(--bg-card); padding: 16px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: linear-gradient(135deg, #10b981, #3b82f6); width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
        .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; background: linear-gradient(to right, #ffffff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { background-color: rgba(16, 185, 129, 0.15); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.3); }

        /* Dashboard & Workspace */
        .dashboard { flex: 1; display: flex; flex-direction: column; width: 100%; max-width: 1100px; margin: 0 auto; padding: 20px; height: calc(100vh - 120px); }
        .workspace { flex: 1; border-radius: 12px; border: 1px solid var(--border-color); background: #1a1a1a; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,0.5); position: relative; }
        
        /* Secure 100% Reliable Frame */
        iframe { width: 100%; height: 100%; border: none; background: #1a1a1a; }

        footer { text-align: center; padding: 12px; border-top: 1px solid var(--border-color); background-color: var(--bg-card); font-size: 12px; color: #9ca3af; }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo-section">
            <div class="logo-icon">&lt;&gt;</div>
            <div class="logo-text">Global AI Coder</div>
            <span class="badge">PRO CODER v6</span>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="dashboard">
        <div class="workspace">
            <!-- Hugging Face ka verified official, block-free embedding view -->
            <iframe src="https://huggingface.co" allow="clipboard-write; microphone"></iframe>
        </div>
    </div>

    <!-- Corporate Footer -->
    <footer>© 2026 Global AI Coder. Powered by Secure Neural Cloud Networks.</footer>

</body>
</html>
